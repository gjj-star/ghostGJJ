<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" width="840" height="440">
  <defs>
    <!-- Gradients -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ec5ff"/>
      <stop offset="30%" stop-color="#5ea8f7"/>
      <stop offset="45%" stop-color="#b8d8ff"/>
      <stop offset="50%" stop-color="#e8f4ff"/>
      <stop offset="55%" stop-color="#b8d8ff"/>
      <stop offset="70%" stop-color="#5ea8f7"/>
      <stop offset="100%" stop-color="#8ec5ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b8beb" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7eb8ff" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1a56b8" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b8beb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b8beb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b8db5"/>
      <stop offset="50%" stop-color="#90b8e0">
        <animate attributeName="stop-color" values="#90b8e0;#6b8db5;#90b8e0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#6b8db5"/>
    </linearGradient>
    <!-- Filter -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="440" rx="20" fill="#060d1a"/>
  <rect x="1" y="1" width="838" height="438" rx="19" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
  <rect x="4" y="4" width="832" height="432" rx="17" fill="none" stroke="#3b8beb" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Ambient glow -->
  <ellipse cx="420" cy="100" rx="300" ry="150" fill="url(#glow)"/>

  <!-- Stars -->
  <g>
    <circle cx="43" cy="58" r="1.2" fill="#a0d2ff"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="32" r="0.8" fill="#a0d2ff"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="80" r="1.5" fill="#b8d8ff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="25" r="0.7" fill="#a0d2ff"><animate attributeName="opacity" values="0.4;0.7;0.4" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="55" r="1.0" fill="#c8e2ff"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="20" r="1.3" fill="#a0d2ff"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="70" r="0.9" fill="#b8d8ff"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="35" r="1.1" fill="#a0d2ff"><animate attributeName="opacity" values="0.5;0.3;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="380" r="1.0" fill="#a0d2ff"><animate attributeName="opacity" values="0.4;0.7;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="400" r="0.6" fill="#c8e2ff"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="410" r="1.4" fill="#b8d8ff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="395" r="0.8" fill="#a0d2ff"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="420" r="1.2" fill="#c8e2ff"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="380" r="0.7" fill="#a0d2ff"><animate attributeName="opacity" values="0.4;0.6;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="405" r="1.0" fill="#b8d8ff"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <!-- Pulsar -->
    <circle cx="150" cy="350" r="1.8" fill="#7eb8ff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;3.5;1.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="130" r="1.6" fill="#7eb8ff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.6;3.2;1.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Shooting star 1 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;0" dur="5s" begin="0s" repeatCount="indefinite"/>
    <line x1="120" y1="40" x2="200" y2="80" stroke="url(#textGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Shooting star 2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;0" dur="7s" begin="2.5s" repeatCount="indefinite"/>
    <line x1="600" y1="30" x2="680" y2="70" stroke="url(#textGrad)" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Constellation lines (decorative) -->
  <line x1="120" y1="32" x2="200" y2="80" stroke="#3b8beb" stroke-width="0.4" stroke-opacity="0.25"/>
  <line x1="200" y1="80" x2="310" y2="25" stroke="#3b8beb" stroke-width="0.4" stroke-opacity="0.25"/>
  <line x1="450" y1="55" x2="560" y2="20" stroke="#3b8beb" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="560" y1="20" x2="670" y2="70" stroke="#3b8beb" stroke-width="0.3" stroke-opacity="0.2"/>

  <!-- Core / Avatar ring -->
  <g transform="translate(420, 100)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="#3b8beb" stroke-width="1.5" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#7eb8ff" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="20 40">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#5ea8f7" stroke-width="1.2" stroke-opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="12" fill="#0a1a3a" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="0" y="5" text-anchor="middle" fill="#7eb8ff" font-size="12" font-family="sans-serif">✦</text>
  </g>

  <!-- Name -->
  <text x="420" y="200" text-anchor="middle" fill="url(#textGrad)" font-size="48" font-weight="bold" font-family="'PingFang SC','Microsoft YaHei',sans-serif" filter="url(#textGlow)">晚 星</text>

  <!-- Sub name -->
  <text x="420" y="225" text-anchor="middle" fill="url(#subGrad)" font-size="14" font-family="'Segoe UI','PingFang SC',sans-serif" letter-spacing="4">GhostLLC</text>

  <!-- Tagline -->
  <text x="420" y="272" text-anchor="middle" fill="#7eb8ff" font-size="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    梦想是不会发光的，发光的是追梦的你。
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Divider line -->
  <line x1="300" y1="295" x2="540" y2="295" stroke="#3b8beb" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Social row -->
  <g transform="translate(420, 330)">
    <text x="0" y="0" text-anchor="middle" fill="#6b8db5" font-size="11" font-family="'Segoe UI','PingFang SC',sans-serif" letter-spacing="2">GitHub: ghostLLC</text>
  </g>
  <g transform="translate(420, 355)">
    <text x="0" y="0" text-anchor="middle" fill="#6b8db5" font-size="11" font-family="'Segoe UI','PingFang SC',sans-serif" letter-spacing="2">Bilibili: Ghost_雲里看晚星</text>
  </g>
  <g transform="translate(420, 380)">
    <text x="0" y="0" text-anchor="middle" fill="#6b8db5" font-size="11" font-family="'Segoe UI','PingFang SC',sans-serif" letter-spacing="2">Steam: llc1203</text>
  </g>
  <g transform="translate(420, 405)">
    <text x="0" y="0" text-anchor="middle" fill="#6b8db5" font-size="11" font-family="'Segoe UI','PingFang SC',sans-serif" letter-spacing="2">抖音: Ghost_晚星</text>
  </g>

  <!-- Scanline overlay -->
  <g opacity="0.03">
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="840" height="3">
      <rect width="840" height="1" fill="#7eb8ff"/>
    </pattern>
    <rect width="840" height="440" rx="20" fill="url(#scanlines)"/>
  </g>
</svg>